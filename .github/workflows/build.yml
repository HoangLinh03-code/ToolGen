# @format
name: Build & Release Windows App

on:
  # 1. Trigger khi push TAG bắt đầu bằng 'v' (ví dụ: v1.0.0, v2.1-beta)
  # Đây là cách chuyên nghiệp nhất để ra mắt phần mềm.
  push:
    tags:
      - "v*"
  # 2. Vẫn giữ trigger manual để test
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # Cấp quyền ghi để Action có thể tạo Release

    steps:
      # --- BƯỚC 1: CHUẨN BỊ MÔI TRƯỜNG ---
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        shell: pwsh
        run: |
          pip install PyQt5 PyQt5-Qt5 PyQt5_sip PyQtWebEngine PyQtWebEngine-Qt5
          pip install -r requirements.txt
          pip install pyinstaller

      # --- BƯỚC 2: TẠO FILE .ENV TỪ SECRET ---
      - name: Create .env file
        shell: pwsh
        run: |
          Set-Content -Path ".env" -Value $env:ENV_KEY_CONTENT -NoNewline
        env:
          ENV_KEY_CONTENT: ${{ secrets.ENV_KEY }}

      # --- BƯỚC 3: BUILD EXE ---
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          # --windowed: Ẩn cửa sổ cmd đen (nếu muốn hiện để debug thì bỏ cờ này đi)
          # --icon: Nếu có icon thì thêm --icon=icon.ico
          python -m PyInstaller `
            --onefile `
            --clean `
            --noconfirm `
            --name ToolGen `
            --add-data ".env;." `
            --add-data "api;api" `
            --add-data "process;process" `
            GenQues.py

      # --- BƯỚC 4: ĐÓNG GÓI (PACKAGING) ---
      - name: Prepare Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "GenQues" -Force

          # Copy file EXE
          Copy-Item -Path "dist/ToolGen.exe" -Destination "GenQues/"

          # Copy file Prompt (Bắt buộc có để chạy)
          Copy-Item -Path "testDS.txt" -Destination "GenQues/"
          Copy-Item -Path "testTN.txt" -Destination "GenQues/"
          Copy-Item -Path "testTLN.txt" -Destination "GenQues/"

      # --- BƯỚC 5: NÉN FILE (QUAN TRỌNG CHO NGƯỜI DÙNG CUỐI) ---
      - name: Zip Release
        shell: pwsh
        run: |
          # Lấy tên Tag (ví dụ v1.0.0)
          $tagName = "${{ github.ref_name }}"
          $zipName = "GenQues-$tagName.zip"

          # Nén thư mục lại thành 1 file zip duy nhất
          Compress-Archive -Path "GenQues" -DestinationPath $zipName

          # Lưu tên file vào biến môi trường để bước sau dùng
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # --- BƯỚC 6: TẠO RELEASE VÀ UPLOAD ---
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ZIP_NAME }}
          draft: false # false = Xuất bản ngay lập tức
          prerelease: false # false = Bản chính thức
          generate_release_notes: true # Tự động tạo ghi chú dựa trên commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
