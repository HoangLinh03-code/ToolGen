name: Build Windows Executable

on:
  push:
    branches: [ "develop" ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PyQt dependencies
        run: pip install PyQt5 PyQt5-Qt5 PyQt5_sip PyQtWebEngine PyQtWebEngine-Qt5
        shell: pwsh
      
      - name: Install other dependencies
        run: pip install -r requirements.txt
        shell: pwsh
      
      # QUAN TRỌNG: Tạo file .env từ secret
      - name: Create .env file from secret
        shell: pwsh
        run: |
          Write-Host "Creating .env file..."
          # Decode base64 nếu bạn lưu dưới dạng base64
          # $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:ENV_KEY_CONTENT))
          # Set-Content -Path ".env" -Value $decoded -NoNewline
          
          # Hoặc ghi trực tiếp nếu lưu plain text
          Set-Content -Path ".env" -Value $env:ENV_KEY_CONTENT -NoNewline
          
          Write-Host ".env file created"
          Write-Host "Content preview (first 100 chars):"
          Get-Content ".env" | Select-Object -First 3 | ForEach-Object { Write-Host $_.Substring(0, [Math]::Min(100, $_.Length)) }
        env:
          ENV_KEY_CONTENT: ${{ secrets.ENV_KEY }}
      
      # Verify file .env exists
      - name: Verify .env file
        shell: pwsh
        run: |
          if (Test-Path ".env") {
            Write-Host ".env file exists"
            Write-Host "File size: $((Get-Item '.env').Length) bytes"
          } else {
            Write-Host ".env file NOT found!"
            exit 1
          }
      
      # Build với PyInstaller - QUAN TRỌNG: Thêm --add-data cho .env
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          Write-Host "Building executable..."
          python -m PyInstaller `
            --onefile `
            --clean `
            --noconfirm `
            --name ToolGen `
            --add-data ".env;." `
            --add-data "api;api" `
            --add-data "process;process" `
            GenQues.py
          
          Write-Host "Build completed"
      
      - name: Create packaging directory
        run: |
          New-Item -ItemType Directory -Path "package" -Force
          Copy-Item -Path "dist/ToolGen.exe" -Destination "package/"
          
          # Tạo README cho user
          @"
          # ToolGen - Hướng dẫn sử dụng
          
          ## Cách chạy:
          1. Giải nén file zip này
          2. Double-click vào ToolGen.exe
          3. File .env đã được tích hợp sẵn trong .exe
          
          ## Lưu ý:
          - Không cần file .env riêng
          - Credentials đã được cấu hình sẵn
          - Nếu cần thay đổi credentials, hãy liên hệ admin
          "@ | Out-File -FilePath "package/README.txt" -Encoding UTF8
        shell: pwsh
      
      - name: Zip executable
        run: Compress-Archive -Path "package/*" -DestinationPath "ToolGen-Windows.zip" -Force
        shell: pwsh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToolGen-Windows-Release
          path: ToolGen-Windows.zip
          if-no-files-found: error
