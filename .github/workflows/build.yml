# @format

name: Build & Release Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # CÀI ĐẶT PANDOC
      - name: Install Pandoc
        shell: pwsh
        run: |
          choco install pandoc --version=3.1.11 --no-progress -y
          pandoc --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        shell: pwsh
        run: |
          pip install PyQt5 PyQt5-Qt5 PyQt5_sip PyQtWebEngine PyQtWebEngine-Qt5
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create .env file
        shell: pwsh
        run: |
          Set-Content -Path ".env" -Value $env:ENV_KEY_CONTENT -NoNewline
        env:
          ENV_KEY_CONTENT: ${{ secrets.ENV_KEY }}

      # BUILD APPLICATION
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller `
            --onefile `
            --clean `
            --noconfirm `
            --name ToolGen `
            --add-data ".env;." `
            --add-data "api;api" `
            --add-data "process;process" `
            GenQues.py

      # ĐÓNG GÓI PANDOC + DEPENDENCIES
      - name: Package Pandoc with Full Dependencies
        shell: pwsh
        run: |
          Write-Host "=== PACKAGING PANDOC ==="

          # 1. Tìm Pandoc
          $pandocExe = (Get-Command pandoc).Source
          $pandocDir = Split-Path -Parent $pandocExe
          Write-Host "Pandoc location: $pandocDir"

          # 2. Tạo thư mục package
          New-Item -ItemType Directory -Path "GenQues" -Force
          New-Item -ItemType Directory -Path "GenQues/pandoc" -Force

          # 3. Copy file EXE chính
          Copy-Item -Path "dist/ToolGen.exe" -Destination "GenQues/"

          # 4. Copy Prompt files
          Copy-Item -Path "testDS.txt" -Destination "GenQues/" -ErrorAction SilentlyContinue
          Copy-Item -Path "testTN.txt" -Destination "GenQues/" -ErrorAction SilentlyContinue
          Copy-Item -Path "testTLN.txt" -Destination "GenQues/" -ErrorAction SilentlyContinue

          # 5. Copy TOÀN BỘ Pandoc folder
          Write-Host "Copying Pandoc files..."
          Copy-Item -Path "$pandocDir\*" -Destination "GenQues/pandoc/" -Recurse -Force

          # 6. Copy Visual C++ Runtime DLLs (QUAN TRỌNG!)
          Write-Host "Copying VC++ Runtime DLLs..."
          $vcDlls = @(
              "vcruntime140.dll",
              "msvcp140.dll", 
              "vcruntime140_1.dll"
          )

          foreach ($dll in $vcDlls) {
              $systemDll = "C:\Windows\System32\$dll"
              if (Test-Path $systemDll) {
                  Copy-Item -Path $systemDll -Destination "GenQues/pandoc/" -Force
                  Write-Host "  ✓ $dll"
              }
          }

          # 7. Verify
          Write-Host "`n=== VERIFICATION ==="
          if (Test-Path "GenQues/pandoc/pandoc.exe") {
              Write-Host "✅ pandoc.exe found"
              
              # Test chạy pandoc
              try {
                  $version = & "GenQues/pandoc/pandoc.exe" --version 2>&1
                  Write-Host "✅ Pandoc works!"
                  Write-Host $version[0]
              } catch {
                  Write-Warning "⚠️ Pandoc test failed: $_"
              }
          } else {
              Write-Error "❌ pandoc.exe NOT found!"
              exit 1
          }

          Write-Host "`nPackage contents:"
          Get-ChildItem "GenQues" -Recurse | Where-Object {!$_.PSIsContainer} | 
              Select-Object FullName, Length | Format-Table -AutoSize

      - name: Zip Release
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          $zipName = "GenQues-$tagName.zip"
          Compress-Archive -Path "GenQues" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
