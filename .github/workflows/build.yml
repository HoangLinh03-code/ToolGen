# @format

name: Build & Release Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # --- BƯỚC 1: CHUẨN BỊ MÔI TRƯỜNG ---
      - name: Check out repository
        uses: actions/checkout@v4

      # [MỚI] Cài đặt Pandoc bằng Chocolatey (có sẵn trên Windows Runner)
      - name: Install Pandoc
        shell: pwsh
        run: |
          choco install pandoc --no-progress
          # Kiểm tra xem pandoc đã cài chưa và in ra đường dẫn
          $pandocPath = (Get-Command pandoc).Source
          Write-Host "Pandoc installed at: $pandocPath"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        shell: pwsh
        run: |
          pip install PyQt5 PyQt5-Qt5 PyQt5_sip PyQtWebEngine PyQtWebEngine-Qt5
          pip install -r requirements.txt
          pip install pyinstaller

      # --- BƯỚC 2: TẠO FILE .ENV TỪ SECRET ---
      - name: Create .env file
        shell: pwsh
        run: |
          Set-Content -Path ".env" -Value $env:ENV_KEY_CONTENT -NoNewline
        env:
          ENV_KEY_CONTENT: ${{ secrets.ENV_KEY }}

      # --- BƯỚC 3: BUILD EXE ---
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller `
            --onefile `
            --clean `
            --noconfirm `
            --name ToolGen `
            --add-data ".env;." `
            --add-data "api;api" `
            --add-data "process;process" `
            GenQues.py

      # --- BƯỚC 4: ĐÓNG GÓI (PACKAGING) ---
      - name: Prepare Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "GenQues" -Force

          # Copy file EXE chính
          Copy-Item -Path "dist/ToolGen.exe" -Destination "GenQues/"

          # Copy các file Prompt
          Copy-Item -Path "testDS.txt" -Destination "GenQues/"
          Copy-Item -Path "testTN.txt" -Destination "GenQues/"
          Copy-Item -Path "testTLN.txt" -Destination "GenQues/"

          # [MỚI] Copy Pandoc.exe vào cùng thư mục với ToolGen.exe
          # Lấy đường dẫn thực tế của pandoc vừa cài đặt
          $pandocPath = (Get-Command pandoc).Source
          Write-Host "Copying Pandoc from $pandocPath"
          Copy-Item -Path $pandocPath -Destination "GenQues/"

      # --- BƯỚC 5: NÉN FILE ---
      - name: Zip Release
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          $zipName = "GenQues-$tagName.zip"
          Compress-Archive -Path "GenQues" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # --- BƯỚC 6: TẠO RELEASE ---
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
