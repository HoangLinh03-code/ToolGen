# @format

# Tên của workflow
name: Build Windows Executable

# Các trigger để chạy workflow
on:
  # 1. Khi push code lên nhánh "develop" (tạo artifact)
  push:
    branches: ["develop"]
  # 2. Khi một "Release" mới được tạo trên GitHub (build và đính kèm file vào release)
  release:
    types: [created]
  # 3. Chạy thủ công
  workflow_dispatch:

jobs:
  build-exe:
    # Luôn chạy trên Windows
    runs-on: windows-latest

    steps:
      # 1. Checkout code
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Cài đặt Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cài đặt các thư viện PyQt
      - name: Install PyQt dependencies
        run: pip install PyQt5 PyQt5-Qt5 PyQt5_sip PyQtWebEngine PyQtWebEngine-Qt5
        shell: pwsh

      # 4. Cài đặt các thư viện khác từ requirements.txt
      - name: Install other dependencies
        run: pip install -r requirements.txt
        shell: pwsh

      # 5. Tạo file .env từ GitHub Secret
      - name: Create .env file from secret
        shell: pwsh
        run: |
          Write-Host "Creating .env file..."
          # Ghi trực tiếp nội dung secret vào file .env
          Set-Content -Path ".env" -Value $env:ENV_KEY_CONTENT -NoNewline
          Write-Host ".env file created"
        env:
          ENV_KEY_CONTENT: ${{ secrets.ENV_KEY }}

      # 6. Xác thực file .env đã được tạo
      - name: Verify .env file
        shell: pwsh
        run: |
          if (Test-Path ".env") {
            Write-Host ".env file exists"
            Write-Host "File size: $((Get-Item '.env').Length) bytes"
          } else {
            Write-Host ".env file NOT found!"
            exit 1
          }

      # 7. Build file .exe bằng PyInstaller
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          Write-Host "Building executable..."
          python -m PyInstaller `
            --onefile `
            --clean `
            --noconfirm `
            --name ToolGen `
            --add-data ".env;." `
            --add-data "api;api" `
            --add-data "process;process" `
            GenQues.py
          Write-Host "Build completed"

      # 8. Tạo thư mục 'package' để chứa các file
      - name: Create packaging directory
        shell: pwsh
        run: |
          # Tạo thư mục 'package'
          New-Item -ItemType Directory -Path "package" -Force

          # Copy file .exe đã build vào
          Copy-Item -Path "dist/ToolGen.exe" -Destination "package/"

          # Copy 2 file prompt vào (YÊU CẦU MỚI)
          # Đảm bảo các file này tồn tại ở thư mục gốc của repo
          Copy-Item -Path "promptGen.txt" -Destination "package/"
          Copy-Item -Path "promptGends.txt" -Destination "package/"

      # 9. Tải lên ARTIFACT (Chỉ chạy cho push 'develop' hoặc 'workflow_dispatch')
      # Artifact này dùng để test nội bộ
      - name: Upload artifact (for dev/manual builds)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ToolGen-Windows-Build
          # Tải lên toàn bộ nội dung thư mục 'package'
          path: package/
          if-no-files-found: error

      # 10. Tải file lên RELEASE (Chỉ chạy khi 'release' được tạo)
      # Đây là các file chính thức cho người dùng
      - name: Upload to Release (for release builds)
        if: github.event_name == 'release'
        env:
          # Token này là bắt buộc để cho phép workflow upload file lên release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "Uploading assets to release ${{ github.event.release.tag_name }}..."
          # Sử dụng GitHub CLI (có sẵn trên runner) để upload
          # Lấy tất cả các file trong thư mục 'package' và upload lên
          gh release upload ${{ github.event.release.tag_name }} package/* --clobber
