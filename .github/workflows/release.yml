# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger khi push tag v1.0.0, v1.2.3, etc.

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --noconsole --name ToolGen GenQues.py
    
    - name: Create version.json
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        $json = @{
          version = $version
          download_url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ToolGen.exe"
          changelog = "${{ github.event.head_commit.message }}"
          release_date = (Get-Date -Format "yyyy-MM-dd")
          required = $false
        } | ConvertTo-Json
        $json | Out-File -FilePath "version.json" -Encoding utf8
      shell: pwsh
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/ToolGen.exe
          version.json
        body: |
          ## What's Changed
          ${{ github.event.head_commit.message }}
          
          ### Installation
          Download `ToolGen.exe` and run it.
          
          ### Full Changelog
          https://github.com/${{ github.repository }}/compare/v1.0.0...${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}